<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保育参加 管理画面</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background-color: #f5f7fa; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #4a6785; padding-bottom: 10px; color: #2c3e50; display: flex; align-items: center; gap: 10px; }
        .card { background: #fafbfc; border: 1px solid #e1e4e8; border-radius: 6px; padding: 20px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #4a5568; }
        input[type="number"], input[type="datetime-local"], input[type="password"] { width: 100%; max-width: 300px; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background-color: #4CAF50; color: white; }
        .btn-primary:hover { background-color: #45a049; }
        .btn-danger { background-color: #f44336; color: white; }
        .btn-danger:hover { background-color: #da190b; }
        .btn-warning { background-color: #f39c12; color: white; }
        .btn-warning:hover { background-color: #d68910; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #e1e4e8; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; color: #4a5568; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 4px 30px 30px 30px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .login-box h3 { margin-bottom: 20px; color: #2c3e50; }
        .login-box input { width: 80%; padding: 10px; margin-bottom: 20px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 16px; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h3>🔑 管理者ログイン</h3>
        <p>スプレッドシートに設定されているパスワードを入力してください。</p>
        <input type="password" id="loginPw" placeholder="パスワードを入力">
        <br>
        <button class="btn-primary" onclick="attemptLogin()">ログイン</button>
    </div>
</div>

<div class="container" id="mainContent" style="display: none;">
    <h2>👥 現在の予約状況一覧（希望日・時間順）</h2>
    <div class="card" style="display: flex; justify-content: flex-end; gap: 10px; border: none; background: none; padding: 0;">
        <button class="btn-primary" style="background-color: #2b6cb0;" onclick="window.print()">🖨️ 印刷する</button>
        <button class="btn-danger" onclick="clearAllBookings()">⚠️ 全予約を一括削除</button>
    </div>

    <table id="bookingsTable">
        <thead>
            <tr>
                <th>希望日</th>
                <th>時間帯</th>
                <th>クラス</th>
                <th>園児氏名</th>
                <th>給食試食</th>
                <th>メールアドレス</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <br><br>

    <h2>⏱️ 予約締切の設定</h2>
    <div class="card">
        <div class="form-group">
            <label for="deadline_days">① ✕日前締切設定（指定された日数未満の予約をブロックします）</label>
            <input type="number" id="deadline_days" min="0" value="0"> 日前
        </div>
        <div class="form-group">
            <label for="force_deadline_datetime">② 一括受付終了日時（指定日時以降、すべての予約受付を終了します）</label>
            <input type="datetime-local" id="force_deadline_datetime">
        </div>
        <div class="btn-group">
            <button class="btn-primary" onclick="saveDeadline()">設定を保存</button>
            <button class="btn-warning" onclick="resetDeadlineFields()">締切をリセット（解除）</button>
        </div>
    </div>
</div>

<script>
    // ⚠️重要：あなたのGASの「ウェブアプリURL」をここに貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxF4WB0ptJ9psXGpWqWYus3MWzB7u5xjYvt0jF3QvlI26h9mVCMHsm09XM4pDv-mjhd/exec";

    let adminToken = "";

    // ページ読み込み時に実行
    window.onload = function() {
        const savedToken = sessionStorage.getItem('adminToken');
        if (savedToken) {
            adminToken = savedToken;
            loadAdminData();
        }
    };

    // ログイン処理
    function attemptLogin() {
        const pw = document.getElementById('loginPw').value.trim();
        if (!pw) {
            alert("パスワードを入力してください。");
            return;
        }

        fetch(`${GAS_URL}?action=adminLogin&pw=${encodeURIComponent(pw)}`)
        .then(res => res.json())
        .then(result => {
            if (result.status === 'success') {
                adminToken = pw;
                sessionStorage.setItem('adminToken', pw);
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                renderData(result.config);
            } else {
                alert("パスワードが正しくありません。");
            }
        })
        .catch(err => alert("通信エラーが発生しました: " + err));
    }

    // データの読み込み
    function loadAdminData() {
        fetch(`${GAS_URL}?action=adminLogin&pw=${encodeURIComponent(adminToken)}`)
        .then(res => res.json())
        .then(result => {
            if (result.status === 'success') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                renderData(result.config);
            } else {
                sessionStorage.removeItem('adminToken');
                location.reload();
            }
        });
    }

    // 画面へのデータ反映
    function renderData(config) {
        if(document.getElementById('deadline_days')) {
            document.getElementById('deadline_days').value = config.deadline_days || 0;
        }
        if(document.getElementById('force_deadline_datetime')) {
            document.getElementById('force_deadline_datetime').value = config.force_deadline_datetime || "";
        }

        const tbody = document.querySelector('#bookingsTable tbody');
        tbody.innerHTML = "";

        if (!config.bookings || config.bookings.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">現在、予約はありません。</td></tr>`;
            return;
        }

        config.bookings.forEach(b => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${b.date}</td>
                <td>${b.timeSlot}</td>
                <td>${b.childClass}</td>
                <td>${b.childName}</td>
                <td>${b.lunchNeeded}</td>
                <td>${b.email || 'なし'}</td>
                <td><button class="btn-danger" style="padding:4px 8px; font-size:12px;" onclick="deleteBooking('${b.id}')">削除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 締切設定の保存
    function saveDeadline() {
        const days = document.getElementById('deadline_days').value;
        const datetime = document.getElementById('force_deadline_datetime').value;

        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "saveDeadline",
                token: adminToken,
                data: { deadlineDays: days, forceDeadlineDatetime: datetime }
            })
        })
        .then(() => {
            alert("締切設定を保存しました。");
            loadAdminData();
        })
        .catch(err => alert("保存エラー: " + err));
    }

    // ✨ 安全なリセット処理（入力欄をゼロ・空欄にしてそのまま安全に保存するだけ）
    function resetDeadlineFields() {
        if (!confirm("締切設定をリセットして、すべての予約枠の締切を解除しますか？")) {
            return;
        }
        // ① 画面の数字と日付を真っさらにする
        document.getElementById('deadline_days').value = 0;
        document.getElementById('force_deadline_datetime').value = "";
        
        // ② その状態のまま、通常の「保存処理」を自動実行する
        saveDeadline();
    }

    // 1件の予約を削除
    function deleteBooking(id) {
        if (!confirm("この予約を削除してもよろしいですか？（スプレッドシートからも消去されます）")) return;

        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "deleteBooking",
                token: adminToken,
                data: { bookingId: id }
            })
        })
        .then(() => {
            alert("予約を削除しました。");
            loadAdminData();
        })
        .catch(err => alert("削除エラー: " + err));
    }

    // すべての予約を一括クリア
    function clearAllBookings() {
        if (!confirm("🚨【警告】本当に全ての予約データを削除しますか？この操作は取り消せません。")) return;

        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "clearAllBookings",
                token: adminToken,
                data: {}
            })
        })
        .then(() => {
            alert("すべての予約データを削除しました。");
            loadAdminData();
        })
        .catch(err => alert("一括削除エラー: " + err));
    }
</script>
</body>
</html>
