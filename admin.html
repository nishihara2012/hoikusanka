<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理】西原りとるぱんぷきんず・保育参加システム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #e6f2ff; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; margin-top: 0; }
        .admin-layout { display: flex; gap: 30px; flex-wrap: wrap; }
        .admin-left { flex: 1; min-width: 350px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
        .admin-right { flex: 1.5; min-width: 450px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #0056b3; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; }
        button:hover { background: #004085; }
        .print-btn { background: #28a745; margin-bottom: 15px; }
        .print-btn:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #e1ecf4; color: #333; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .hidden { display: none; }
        .auth-container { max-width: 350px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 印刷用設定（右画面の予約状況一覧のみを綺麗に印刷） */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            th { background-color: #e1ecf4 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div id="authView" class="auth-container">
    <h3 style="text-align:center; margin-top:0;">管理画面 ログイン</h3>
    <div class="form-group">
        <label for="adminPasswordInput">パスワード</label>
        <input type="password" id="adminPasswordInput">
    </div>
    <button onclick="checkPassword()">ログイン</button>
</div>

<div id="mainView" class="container hidden">
    <h2>西原りとるぱんぷきんず 保育参加管理システム</h2>
    <div class="admin-layout">
        
        <div class="admin-left">
            <h3>システム設定</h3>
            <div class="form-group">
                <label>締切設定（例: 3日前 / 2026-07-01）</label>
                <input type="text" id="cfgDeadline" placeholder="締切条件を入力">
            </div>
            <div class="form-group">
                <label>クラス設定（カンマ「,」区切り）</label>
                <input type="text" id="cfgClasses" value="ひよこ,りす,うさぎ,くま,ぞう,きりん">
            </div>
            <div class="form-group">
                <label>希望日設定（カンマ「,」区切り）</label>
                <input type="text" id="cfgDates" placeholder="例: 2026-07-01,2026-07-02">
            </div>
            <div class="form-group">
                <label>時間設定（カンマ「,」区切り）</label>
                <input type="text" id="cfgTimes" value="09:00-11:00,11:00-13:00">
            </div>
            <div class="form-group">
                <label>昼食時間設定（上記時間帯と完全一致で表示）</label>
                <input type="text" id="cfgLunchTime" value="11:00-13:00">
            </div>
            <div class="form-group">
                <label>定員数設定（1枠あたりの上限組数）</label>
                <input type="number" id="cfgLimit" value="3">
            </div>
            <div class="form-group">
                <label>管理者通知先メールアドレス</label>
                <input type="email" id="cfgAdminEmail" placeholder="園のメールアドレス">
            </div>
            <div class="form-group">
                <label>管理画面パスワード変更</label>
                <input type="password" id="cfgPassword" value="1234">
            </div>
            <button onclick="saveSettings()" id="saveBtn">設定を一括保存する</button>
        </div>
        
        <div class="admin-right">
            <h3>予約状況一覧</h3>
            <button class="print-btn" onclick="window.print()">予約状況一覧のみ印刷する</button>
            
            <div id="printArea">
                <table id="reservationTable">
                    <thead>
                        <tr>
                            <th>クラス</th>
                            <th>希望日</th>
                            <th>時間帯</th>
                            <th>園児氏名</th>
                            <th>昼食</th>
                            <th>保護者メール</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️【差し替え】index.htmlと同じGASのウェブアプリURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxthf1gX82T3s9lOwl_Xc9RFdISH16-_JP2HUboCaEB68bznKsI-KzrGBmvwXUUtYoE/exec";
    let systemConfig = {};

    // 最初にスプレッドシートから現在の設定と予約状況データをまとめて取得
    async function loadAdminData() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            systemConfig = data.config || {};
            
            // 取得した設定値を入力欄に反映
            if(systemConfig.password) {
                document.getElementById('cfgDeadline').value = systemConfig.deadline || '';
                document.getElementById('cfgClasses').value = systemConfig.classes || '';
                document.getElementById('cfgDates').value = systemConfig.dates || '';
                document.getElementById('cfgTimes').value = systemConfig.times || '';
                document.getElementById('cfgLunchTime').value = systemConfig.lunchTime || '';
                document.getElementById('cfgLimit').value = systemConfig.limit || 3;
                document.getElementById('cfgAdminEmail').value = systemConfig.adminEmail || '';
                document.getElementById('cfgPassword').value = systemConfig.password || '1234';
            }

            // 予約状況一覧テーブルの描画（クラス、希望日、時間の順にソート済み）
            const tbody = document.querySelector('#reservationTable tbody');
            tbody.innerHTML = '';
            if(data.reservations && data.reservations.length > 0) {
                data.reservations.forEach(res => {
                    let row = `<tr>
                        <td>${res.className}</td>
                        <td>${res.date}</td>
                        <td>${res.timeSlot}</td>
                        <td>${res.childName}</td>
                        <td>${res.lunch}</td>
                        <td>${res.email}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">現在、予約はありません。</td></tr>';
            }
        } catch (error) {
            console.error(error);
            alert("データの取得に失敗しました。");
        }
    }

    // パスワード認証
    function checkPassword() {
        const input = document.getElementById('adminPasswordInput').value;
        const correctPassword = systemConfig.password || "1234"; // 初期状態は1234
        
        if(input === correctPassword) {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
        } else {
            alert('パスワードが正しくありません。');
        }
    }

    // 設定の一括保存処理
    async function saveSettings() {
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "保存中...";

        const payload = {
            type: "admin_save",
            deadline: document.getElementById('cfgDeadline').value,
            classes: document.getElementById('cfgClasses').value,
            dates: document.getElementById('cfgDates').value,
            times: document.getElementById('cfgTimes').value,
            lunchTime: document.getElementById('cfgLunchTime').value,
            limit: document.getElementById('cfgLimit').value,
            adminEmail: document.getElementById('cfgAdminEmail').value,
            password: document.getElementById('cfgPassword').value
        };

        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const res = await response.json();
            alert(res.message);
            location.reload(); // 最新情報を再読み込み
        } catch (error) {
            alert("設定の保存に失敗しました。");
            saveBtn.disabled = false;
            saveBtn.innerText = "設定を一括保存する";
        }
    }

    // 起動時にデータを先読み
    window.onload = loadAdminData;
</script>
</body>
</html>
