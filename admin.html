<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理】西原りとるぱんぷきんず・保育参加システム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #e6f2ff; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; margin-top: 0; }
        .admin-layout { display: flex; gap: 30px; flex-wrap: wrap; }
        .admin-left { flex: 1.2; min-width: 400px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
        .admin-right { flex: 1.5; min-width: 450px; }
        .form-group { margin-bottom: 25px; border-bottom: 1px dashed #ddd; padding-bottom: 20px; }
        .form-group:last-child { border-bottom: none; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #004085; }
        .input-inline { display: flex; gap: 8px; margin-bottom: 10px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input[type="text"], input[type="email"], select { flex: 1; }
        button { background: #0056b3; color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #004085; }
        button.btn-delete { background: #dc3545; padding: 4px 8px; font-size: 11px; }
        button.btn-delete:hover { background: #bd2130; }
        .item-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .item-badge { background: #e1ecf4; padding: 4px 8px; border-radius: 4px; font-size: 13px; display: flex; align-items: center; gap: 6px; border: 1px solid #bce0fd; }
        .print-btn { background: #28a745; margin-bottom: 15px; padding: 12px; font-size: 15px; width: 48%; }
        .print-btn:hover { background: #218838; }
        .clear-all-btn { background: #dc3545; margin-bottom: 15px; padding: 12px; font-size: 15px; width: 48%; float: right; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #e1ecf4; color: #333; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .hidden { display: none; }
        .auth-container { max-width: 350px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section-title { font-size: 12px; color: #666; margin-bottom: 4px; font-weight: normal; }
        
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            th { background-color: #e1ecf4 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div id="authView" class="auth-container">
    <h3 style="text-align:center; margin-top:0;">管理画面 ログイン</h3>
    <div style="margin-bottom: 15px;">
        <label for="adminPasswordInput">パスワード</label>
        <input type="password" id="adminPasswordInput" style="width:100%;">
    </div>
    <button onclick="checkPassword()" style="width:100%; padding:10px;">ログイン</button>
</div>

<div id="mainView" class="container hidden">
    <h2>西原りとるぱんぷきんず 保育参加管理システム</h2>
    <div class="admin-layout">
        
        <div class="admin-left">
            <h3>各項目設定</h3>
            
            <div class="form-group">
                <label>① 締切設定</label>
                <div style="background:#fff; padding:10px; border-radius:4px; border:1px solid #ddd; margin-bottom:10px;">
                    <select id="deadlineType" onchange="toggleDeadlineInput()" style="width: 100%; margin-bottom: 8px;">
                        <option value="none">制限なし（いつでも予約可能）</option>
                        <option value="days">〇日前までに締切</option>
                        <option value="datetime">指定日時で一括締切</option>
                    </select>
                    <div id="divDeadlineDays" class="hidden" style="margin-bottom: 8px;">
                        <select id="cfgDeadlineDays" style="width: 100%;">
                            <option value="1日前">1日前までに締切</option>
                            <option value="2日前">2日前までに締切</option>
                            <option value="3日前">3日前までに締切</option>
                            <option value="5日前">5日前までに締切</option>
                            <option value="7日前">1週間前までに締切</option>
                        </select>
                    </div>
                    <div id="divDeadlineDatetime" class="hidden" style="margin-bottom: 8px;">
                        <input type="datetime-local" id="cfgDeadlineDatetime" style="width: 100%;">
                    </div>
                </div>
                <div class="input-inline">
                    <button onclick="saveDeadlineSetting()" style="flex: 2;">締切を保存</button>
                    <button class="btn-delete" onclick="clearDeadlineSetting()" style="flex: 1; padding: 8px;">クリア</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>② クラス設定</label>
                <div class="input-inline">
                    <input type="text" id="newClassInput" placeholder="例: ひよこ組">
                    <button onclick="addItemToList('classes', 'newClassInput', 'save_classes')">追加</button>
                </div>
                <div class="item-list" id="classList"></div>
            </div>
            
            <div class="form-group">
                <label>③ 希望日設定</label>
                <div style="background:#fff; padding:10px; border-radius:4px; border:1px solid #ddd; margin-bottom:10px;">
                    <input type="date" id="singleDateInput">
                    <button onclick="addDateIndividual()">個別追加</button>
                </div>
                <div style="background:#fff; padding:10px; border-radius:4px; border:1px solid #ddd;">
                    <div class="input-inline">
                        <input type="date" id="startDateInput" style="width:45%;">
                        <span>～</span>
                        <input type="date" id="endDateInput" style="width:45%;">
                    </div>
                    <button onclick="addDateBulk()" style="width:100%;">一括追加</button>
                </div>
                <div class="item-list" id="dateList"></div>
            </div>
            
            <div class="form-group">
                <label>④ 時間設定</label>
                <div class="input-inline">
                    <input type="time" id="timeStart" value="09:00"><span>～</span><input type="time" id="timeEnd" value="11:00">
                    <button onclick="addTimeIndividual()">追加</button>
                </div>
                <div class="item-list" id="timeList"></div>
            </div>
            
            <div class="form-group">
                <label>⑤ 昼食時間設定</label>
                <div class="input-inline">
                    <select id="cfgLunchTime"><option value="">選択肢なし</option></select>
                    <button onclick="saveSingleField('save_lunch', document.getElementById('cfgLunchTime').value)">設定</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>⑥ 定員数設定</label>
                <div class="input-inline">
                    <input type="number" id="cfgLimit" value="3" min="1">
                    <button onclick="saveSingleField('save_limit', document.getElementById('cfgLimit').value)">保存</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>⑦ 通知先メール設定</label>
                <div class="input-inline">
                    <input type="email" id="cfgAdminEmail">
                    <button onclick="saveSingleField('save_admin_email', document.getElementById('cfgAdminEmail').value)">保存</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>⑧ パスワード設定</label>
                <div class="input-inline">
                    <input type="password" id="cfgPassword">
                    <button onclick="saveSingleField('save_password', document.getElementById('cfgPassword').value)">変更</button>
                </div>
            </div>
        </div>
        
        <div class="admin-right">
            <h3>予約状況一覧</h3>
            <button class="print-btn" onclick="window.print()">印刷する</button>
            <button class="clear-all-btn" onclick="clearAllReservations()">予約データを一括削除</button>
            
            <div id="printArea">
                <table id="reservationTable">
                    <thead>
                        <tr>
                            <th>クラス</th>
                            <th>希望日</th>
                            <th>時間帯</th>
                            <th>園児氏名</th>
                            <th>昼食</th>
                            <th>保護者メール</th>
                            <th class="no-print">操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️【差し替え】新しくデプロイしたGASのウェブアプリURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwY1-zFs4OzxJyd31eiev6TWJRJvqYA--lYJFdBPLSXxYx9-djkFnlxLk71JUMODyGk/exec";
    let systemConfig = {};

    async function loadAdminData() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            systemConfig = data.config || {};
            
            const dlValue = systemConfig.deadline || '';
            const dlTypeSelect = document.getElementById('deadlineType');
            if (!dlValue) {
                dlTypeSelect.value = 'none';
            } else if (dlValue.includes('日前') || dlValue.includes('週間前')) {
                dlTypeSelect.value = 'days';
                document.getElementById('cfgDeadlineDays').value = dlValue;
            } else {
                dlTypeSelect.value = 'datetime';
                document.getElementById('cfgDeadlineDatetime').value = dlValue;
            }
            toggleDeadlineInput();

            document.getElementById('cfgLimit').value = systemConfig.limit || '3';
            document.getElementById('cfgAdminEmail').value = systemConfig.adminEmail || '';
            document.getElementById('cfgPassword').value = systemConfig.password || '1234';

            renderBadges('classList', systemConfig.classes, 'save_classes');
            renderBadges('dateList', systemConfig.dates, 'save_dates');
            renderBadges('timeList', systemConfig.times, 'save_times');

            const lunchSelect = document.getElementById('cfgLunchTime');
            lunchSelect.innerHTML = '<option value="">-- 指定なし --</option>';
            if(systemConfig.times) {
                systemConfig.times.split(',').forEach(t => {
                    const selected = (t.trim() === systemConfig.lunchTime) ? 'selected' : '';
                    lunchSelect.innerHTML += `<option value="${t.trim()}">${t.trim()}</option>`;
                });
            }

            const tbody = document.querySelector('#reservationTable tbody');
            tbody.innerHTML = '';
            if(data.reservations && data.reservations.length > 0) {
                data.reservations.forEach(res => {
                    // 日付変換（万が一ISO表記になっても綺麗に直す）
                    let dDisplay = res.date;
                    if(dDisplay.includes('T')) dDisplay = dDisplay.split('T')[0];

                    tbody.innerHTML += `<tr>
                        <td>${res.className}</td>
                        <td>${dDisplay}</td>
                        <td>${res.timeSlot}</td>
                        <td>${res.childName}</td>
                        <td>${res.lunch}</td>
                        <td>${res.email}</td>
                        <td class="no-print"><button class="btn-delete" onclick="deleteSingleReservation('${res.childName}','${res.date}','${res.timeSlot}')">削除</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#999;">現在、予約はありません。</td></tr>';
            }
        } catch (error) {
            alert("データの取得に失敗しました。");
        }
    }

    function toggleDeadlineInput() {
        const type = document.getElementById('deadlineType').value;
        document.getElementById('divDeadlineDays').classList.add('hidden');
        document.getElementById('divDeadlineDatetime').classList.add('hidden');
        if (type === 'days') document.getElementById('divDeadlineDays').classList.remove('hidden');
        if (type === 'datetime') document.getElementById('divDeadlineDatetime').classList.remove('hidden');
    }

    function saveDeadlineSetting() {
        const type = document.getElementById('deadlineType').value;
        let finalValue = "";
        if (type === 'days') finalValue = document.getElementById('cfgDeadlineDays').value;
        if (type === 'datetime') finalValue = document.getElementById('cfgDeadlineDatetime').value;
        sendRawValue('save_deadline', finalValue);
    }

    function clearDeadlineSetting() {
        if(confirm("締切をクリアしますか？")) {
            sendRawValue('delete_deadline', '');
        }
    }

    async function deleteSingleReservation(name, date, time) {
        if(!confirm(name + " 様の予約を削除しますか？")) return;
        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'delete_reservation', childName: name, date: date, timeSlot: time }) });
            const res = await response.json();
            alert(res.message);
            loadAdminData();
        } catch(e) { alert("削除に失敗しました。"); }
    }

    async function clearAllReservations() {
        if(!confirm("⚠️本当にすべての予約データを削除しますか？スプレッドシートの中身もクリアされます。")) return;
        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'clear_all_reservations' }) });
            const res = await response.json();
            alert(res.message);
            loadAdminData();
        } catch(e) { alert("一括削除に失敗しました。"); }
    }

    function renderBadges(containerId, commaString, updateActionType) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if(!commaString) return;
        commaString.split(',').forEach((item, index, arr) => {
            if(!item.trim()) return;
            const badge = document.createElement('div');
            badge.className = 'item-badge';
            badge.innerHTML = `<span>${item.trim()}</span>`;
            const delBtn = document.createElement('button');
            delBtn.className = 'btn-delete';
            delBtn.innerText = '×';
            delBtn.onclick = () => {
                arr.splice(index, 1);
                sendRawValue(updateActionType, arr.join(','));
            };
            badge.appendChild(delBtn);
            container.appendChild(badge);
        });
    }

    function addItemToList(configKey, inputId, actionType) {
        const el = document.getElementById(inputId);
        if(!el.value.trim()) return;
        let items = systemConfig[configKey] ? systemConfig[configKey].split(',') : [];
        if(items.includes(el.value.trim())) return alert("登録済みです");
        items.push(el.value.trim());
        sendRawValue(actionType, items.join(','));
        el.value = '';
    }

    function addDateIndividual() {
        const d = document.getElementById('singleDateInput').value;
        if(!d) return;
        let items = systemConfig.dates ? systemConfig.dates.split(',') : [];
        if(!items.includes(d)) items.push(d);
        sendRawValue('save_dates', items.join(','));
    }

    function addDateBulk() {
        const s = document.getElementById('startDateInput').value;
        const e = document.getElementById('endDateInput').value;
        if(!s || !e) return;
        let start = new Date(s), end = new Date(e);
        let items = systemConfig.dates ? systemConfig.dates.split(',') : [];
        while(start <= end) {
            let y = start.getFullYear(), m = String(start.getMonth()+1).padStart(2,'0'), d = String(start.getDate()).padStart(2,'0');
            let str = `${y}-${m}-${d}`;
            if(!items.includes(str)) items.push(str);
            start.setDate(start.getDate() + 1);
        }
        sendRawValue('save_dates', items.join(','));
    }

    function addTimeIndividual() {
        const s = document.getElementById('timeStart').value, e = document.getElementById('timeEnd').value;
        let items = systemConfig.times ? systemConfig.times.split(',') : [];
        if(!items.includes(`${s}-${e}`)) items.push(`${s}-${e}`);
        sendRawValue('save_times', items.join(','));
    }

    function saveSingleField(type, val) { sendRawValue(type, val); }

    async function sendRawValue(type, value) {
        try {
            const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: type, value: value }) });
            const res = await r.json();
            if(res.status === "success") loadAdminData();
        } catch (e) { alert("通信エラー"); }
    }

    function checkPassword() {
        if(document.getElementById('adminPasswordInput').value === (systemConfig.password || "1234")) {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
        } else { alert('パスワードが違います'); }
    }
    window.onload = loadAdminData;
</script>
</body>
</html>
