<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理】西原りとるぱんぷきんず・保育参加システム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #e6f2ff; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; margin-top: 0; }
        .admin-layout { display: flex; gap: 30px; flex-wrap: wrap; }
        .admin-left { flex: 1; min-width: 380px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; }
        .admin-right { flex: 1.5; min-width: 450px; }
        .form-group { margin-bottom: 20px; border-bottom: 1px dashed #ddd; padding-bottom: 15px; }
        .form-group:last-child { border-bottom: none; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #004085; }
        .input-btn-group { display: flex; gap: 8px; margin-top: 5px; }
        input, select { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #0056b3; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
        button:hover { background: #004085; }
        button.btn-delete { background: #dc3545; }
        button.btn-delete:hover { background: #bd2130; }
        .print-btn { background: #28a745; margin-bottom: 15px; padding: 12px; font-size: 15px; width: 100%; }
        .print-btn:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #e1ecf4; color: #333; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .hidden { display: none; }
        .auth-container { max-width: 350px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            th { background-color: #e1ecf4 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div id="authView" class="auth-container">
    <h3 style="text-align:center; margin-top:0;">管理画面 ログイン</h3>
    <div style="margin-bottom: 15px;">
        <label for="adminPasswordInput">パスワード (初期値: 1234)</label>
        <input type="password" id="adminPasswordInput" style="width:100%;">
    </div>
    <button onclick="checkPassword()" style="width:100%; padding:10px;">ログイン</button>
</div>

<div id="mainView" class="container hidden">
    <h2>西原りとるぱんぷきんず 保育参加管理システム</h2>
    <div class="admin-layout">
        
        <div class="admin-left">
            <h3>各項目設定</h3>
            
            <div class="form-group">
                <label>① 締切設定 (例: 3日前 / 2026-07-01)</label>
                <div class="input-btn-group">
                    <input type="text" id="cfgDeadline" placeholder="未設定">
                    <button onclick="sendItem('save_deadline', 'cfgDeadline')">保存</button>
                    <button class="btn-delete" onclick="sendItem('delete_deadline', 'cfgDeadline', true)">削除</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>② クラス設定 (カンマ「,」区切り)</label>
                <div class="input-btn-group">
                    <input type="text" id="cfgClasses" placeholder="例: ひよこ,りす,うさぎ">
                    <button onclick="sendItem('save_classes', 'cfgClasses')">保存</button>
                    <button class="btn-delete" onclick="sendItem('delete_classes', 'cfgClasses', true)">一括削除</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>③ 希望日設定 (カンマ「,」区切り)</label>
                <div class="input-btn-group">
                    <input type="text" id="cfgDates" placeholder="例: 2026-07-01,2026-07-02">
                    <button onclick="sendItem('save_dates', 'cfgDates')">保存</button>
                    <button class="btn-delete" onclick="sendItem('delete_dates', 'cfgDates', true)">一括削除</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>④ 時間設定 (カンマ「,」区切り)</label>
                <div class="input-btn-group">
                    <input type="text" id="cfgTimes" placeholder="例: 09:00-11:00,11:00-13:00">
                    <button onclick="sendItem('save_times', 'cfgTimes')">保存</button>
                    <button class="btn-delete" onclick="sendItem('delete_times', 'cfgTimes', true)">一括削除</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>⑤ 昼食時間設定 (上記時間枠と完全一致で表示)</label>
                <div class="input-btn-group">
                    <input type="text" id="cfgLunchTime" placeholder="例: 11:00-13:00">
                    <button onclick="sendItem('save_lunch', 'cfgLunchTime')">設定保存</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>⑥ 定員数設定 (各クラス1枠あたりの上限組数)</label>
                <div class="input-btn-group">
                    <input type="number" id="cfgLimit">
                    <button onclick="sendItem('save_limit', 'cfgLimit')">定員保存</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>⑦ 管理者用通知先メールアドレス設定</label>
                <div class="input-btn-group">
                    <input type="email" id="cfgAdminEmail" placeholder="園の受信用アドレス">
                    <button onclick="sendItem('save_admin_email', 'cfgAdminEmail')">アドレス保存</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>⑧ 管理画面パスワード設定</label>
                <div class="input-btn-group">
                    <input type="password" id="cfgPassword">
                    <button onclick="sendItem('save_password', 'cfgPassword')">PW変更</button>
                </div>
            </div>
        </div>
        
        <div class="admin-right">
            <h3>予約状況一覧</h3>
            <button class="print-btn" onclick="window.print()">予約状況一覧のみ印刷する</button>
            
            <div id="printArea">
                <table id="reservationTable">
                    <thead>
                        <tr>
                            <th>クラス</th>
                            <th>希望日</th>
                            <th>時間帯</th>
                            <th>園児氏名</th>
                            <th>昼食</th>
                            <th>保護者メール</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️【差し替え】新しくデプロイしたGASのウェブアプリURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw-RyCGtFWyK_nn696zma4kIx75nALg0U99ciu-USHbfTHtu-Aitr8TGMYTFBLWLzAg/exec";
    let systemConfig = {};

    async function loadAdminData() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            systemConfig = data.config || {};
            
            // 各入力欄に現在の設定値を反映
            document.getElementById('cfgDeadline').value = systemConfig.deadline || '';
            document.getElementById('cfgClasses').value = systemConfig.classes || '';
            document.getElementById('cfgDates').value = systemConfig.dates || '';
            document.getElementById('cfgTimes').value = systemConfig.times || '';
            document.getElementById('cfgLunchTime').value = systemConfig.lunchTime || '';
            document.getElementById('cfgLimit').value = systemConfig.limit || '3';
            document.getElementById('cfgAdminEmail').value = systemConfig.adminEmail || '';
            document.getElementById('cfgPassword').value = systemConfig.password || '1234';

            // テーブル描画（クラス・日付・時間の順）
            const tbody = document.querySelector('#reservationTable tbody');
            tbody.innerHTML = '';
            if(data.reservations && data.reservations.length > 0) {
                data.reservations.forEach(res => {
                    tbody.innerHTML += `<tr>
                        <td>${res.className}</td>
                        <td>${res.date}</td>
                        <td>${res.timeSlot}</td>
                        <td>${res.childName}</td>
                        <td>${res.lunch}</td>
                        <td>${res.email}</td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">現在、予約はありません。</td></tr>';
            }
        } catch (error) {
            alert("データの取得に失敗しました。");
        }
    }

    function checkPassword() {
        const input = document.getElementById('adminPasswordInput').value;
        if(input === (systemConfig.password || "1234")) {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
        } else {
            alert('パスワードが正しくありません。');
        }
    }

    // 各項目個別の通信処理
    async function sendItem(type, inputId, isDelete = false) {
        if (isDelete && !confirm("本当にこの項目を削除（クリア）しますか？")) {
            return;
        }

        const inputEl = document.getElementById(inputId);
        const payload = {
            type: type,
            value: isDelete ? "" : inputEl.value
        };

        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const res = await response.json();
            alert(res.message);
            loadAdminData(); // 画面の値を再更新
        } catch (error) {
            alert("通信に失敗しました。");
        }
    }

    window.onload = loadAdminData;
</script>
</body>
</html>
