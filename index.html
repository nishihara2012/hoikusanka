<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西原りとるぱんぷきんず・保育参加申し込み</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff5e6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #ff8c00; margin-bottom: 25px; font-size: 22px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 7px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input:focus, select:focus { border-color: #ff8c00; outline: none; box-shadow: 0 0 5px rgba(255,140,0,0.3); }
        button { background: #ff8c00; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #e07b00; }
        .hidden { display: none; }
        #loading { text-align: center; font-weight: bold; color: #666; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>保育参加 申し込みフォーム</h2>
    <div id="loading">設定データを読み込み中...</div>
    
    <form id="reserveForm" class="hidden">
        <div class="form-group">
            <label for="userClass">クラス選択</label>
            <select id="userClass" required></select>
        </div>
        <div class="form-group">
            <label for="userChildName">園児氏名（姓名）</label>
            <input type="text" id="userChildName" placeholder="例：西原 太郎" required>
        </div>
        <div class="form-group">
            <label for="userDate">希望日</label>
            <select id="userDate" required></select>
        </div>
        <div class="form-group">
            <label for="userTime">時間帯</label>
            <select id="userTime" onchange="toggleLunchField()" required></select>
        </div>
        <div class="form-group hidden" id="lunchField">
            <label for="userLunch">昼食有無</label>
            <select id="userLunch">
                <option value="有">有</option>
                <option value="無" selected>無</option>
            </select>
        </div>
        <div class="form-group">
            <label for="userEmail">保護者メールアドレス（予約確認用）</label>
            <input type="email" id="userEmail" placeholder="例：parent@example.com" required>
        </div>
        <button type="submit" id="submitBtn">予約を確定する</button>
    </form>
</div>

<script>
    // ⚠️【差し替え】ここにデプロイしたGASのウェブアプリURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxthf1gX82T3s9lOwl_Xc9RFdISH16-_JP2HUboCaEB68bznKsI-KzrGBmvwXUUtYoE/exec";
    let systemConfig = {};

    // 画面ロード時に管理画面での設定（クラス、日付、時間など）を読み込む
    async function loadConfig() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            systemConfig = data.config;
            
            if(systemConfig && systemConfig.classes) {
                setupSelect('userClass', systemConfig.classes.split(','));
                setupSelect('userDate', systemConfig.dates.split(','));
                setupSelect('userTime', systemConfig.times.split(','));
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('reserveForm').classList.remove('hidden');
                toggleLunchField();
            } else {
                document.getElementById('loading').innerText = "システムが初期設定されていません。園にお問い合わせください。";
            }
        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerText = "データの読み込みに失敗しました。";
        }
    }

    function setupSelect(id, array) {
        const select = document.getElementById(id);
        select.innerHTML = '';
        array.forEach(item => {
            select.innerHTML += `<option value="${item.trim()}">${item.trim()}</option>`;
        });
    }

    // 設定された「昼食時間帯」と一致した場合のみ昼食選択を表示
    function toggleLunchField() {
        const selectedTime = document.getElementById('userTime').value;
        const lunchField = document.getElementById('lunchField');
        if (systemConfig.lunchTime && selectedTime === systemConfig.lunchTime.trim()) {
            lunchField.classList.remove('hidden');
        } else {
            lunchField.classList.add('hidden');
            document.getElementById('userLunch').value = "無";
        }
    }

    // 予約の送信処理
    document.getElementById('reserveForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "送信中...";

        const payload = {
            type: "user_reserve",
            className: document.getElementById('userClass').value,
            childName: document.getElementById('userChildName').value,
            date: document.getElementById('userDate').value,
            timeSlot: document.getElementById('userTime').value,
            lunch: document.getElementById('userLunch').value,
            email: document.getElementById('userEmail').value
        };

        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const res = await response.json();
            alert(res.message);
            if(res.status === "success") {
                document.getElementById('reserveForm').reset();
                toggleLunchField();
            }
        } catch (error) {
            alert("通信エラーが発生しました。時間を置いてやり直してください。");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "予約を確定する";
        }
    });

    window.onload = loadConfig;
</script>
</body>
</html>
